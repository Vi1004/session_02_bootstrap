<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Yen Vi - My Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* CSS chuẩn theo Design Specs của đề bài */
        .card {
            border: none;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            border-radius: 12px;
            overflow: hidden; /* Để bo tròn ảnh card-img-top */
        }
        
        .sticky-top {
            position: sticky;
            top: 100px; /* Thụt xuống dưới thanh menu */
            z-index: 1;
        }

        /* Thêm style giúp ép các ảnh bài viết đều tăm tắp */
        .blog-img {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
